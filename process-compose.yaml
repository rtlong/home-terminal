version: "0.5"

processes:
  beam:
    command: |
      gleam build
      PA=$(find build/dev/erlang -maxdepth 2 -name ebin -type d | sort | sed 's/^/-pa /' | tr '\n' ' ')
      exec erl $PA -eval "home_terminal@@main:run(app)" -noshell
    availability:
      restart: always
      backoff_seconds: 1
      max_restarts: 0

  watcher:
    command: |
      watchexec \
        --watch src \
        --exts gleam \
        --on-busy-update queue \
        -- rebuild-and-restart
    availability:
      restart: on_failure
      backoff_seconds: 1
      max_restarts: 0

  tailwind:
    command: |
      tailwindcss \
        --config tailwind.config.js \
        --input tailwind.css \
        --output priv/static/app.css \
        --watch
    availability:
      restart: on_failure
      backoff_seconds: 1
      max_restarts: 0
